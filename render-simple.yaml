# WhatsApp 訂單機器人 - Render 部署配置
services:
  - type: web
    name: whatsapp-order-bot
    env: python
    pythonVersion: 3.11.6  # 指定 Python 版本
    region: singapore
    buildCommand: |
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port ${PORT}
    envVars:
      - key: DATABASE_URL
        sync: false  # 手動設置
      - key: TWILIO_ACCOUNT_SID
        sync: false  # 手動設置
      - key: TWILIO_AUTH_TOKEN
        sync: false  # 手動設置
      - key: TWILIO_WHATSAPP_NUMBER
        value: whatsapp:+14155238886
      - key: CLOUDINARY_URL
        sync: false  # 手動設置
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: whatsapp-bot-data
      mountPath: /data
      sizeGB: 1
    scaling:
      minInstances: 1
      maxInstances: 1
      targetMemoryPercent: 80
      targetCPUPercent: 80