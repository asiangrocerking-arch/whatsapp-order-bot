services:
  # PostgreSQL 數據庫
  - type: pserv
    name: whatsapp-bot-db
    plan: starter # 免費計劃，1GB存儲
    region: singapore
    env: postgres
    repo: https://github.com/render-examples/postgres-example
    branch: main
    autoDeploy: false # 數據庫不需要自動部署
    disk:
      name: pg-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1

  # Web服務
  - type: web
    name: whatsapp-order-bot
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: |
      alembic upgrade head
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: whatsapp-bot-db
          property: connectionString # Render會自動注入數據庫連接串
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: whatsapp:+14155238886
      - key: CLOUDINARY_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
    autoDeploy: true
    disk:
      name: whatsapp-bot-data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /health
    scaling:
      minInstances: 1
      maxInstances: 1
      targetMemoryPercent: 80
      targetCPUPercent: 80