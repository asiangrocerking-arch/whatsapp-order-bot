services:
  # 主應用服務
  - type: web
    name: whatsapp-order-bot
    env: python
    region: singapore  # 可選：singapore, oregon, frankfurt 等
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port ${PORT}
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: whatsapp-order-bot-db
          property: connectionString
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: whatsapp:+14155238886
      - key: CLOUDINARY_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
    healthCheckPath: /health
    autoDeploy: true

  # PostgreSQL 數據庫
  - type: postgres
    name: whatsapp-order-bot-db
    region: singapore
    plan: free  # free, starter, standard 等
    ipAllowList: []  # 允許所有 IP 訪問
    databaseName: whatsapp_order_bot
    user: whatsapp_bot_user
