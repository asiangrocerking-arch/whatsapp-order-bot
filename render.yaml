databases:
  # PostgreSQL 数据库 (免费计划)
  - name: whatsapp-bot-db
    region: singapore
    plan: free
    ipAllowList: []

services:
  # Web服务 (免费计划)
  - type: web
    name: whatsapp-order-bot
    env: python
    region: singapore
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install --only-binary :all: -r requirements.txt
    startCommand: |
      alembic upgrade head
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: whatsapp-bot-db
          property: connectionString
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: whatsapp:+14155238886
      - key: CLOUDINARY_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      - key: PYTHONUNBUFFERED
        value: "true"
    autoDeploy: true
    healthCheckPath: /health