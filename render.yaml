databases:
  # PostgreSQL 数据库
  - name: whatsapp-bot-db
    region: singapore
    plan: free
    ipAllowList: []  # 允许所有IP访问

services:
  # Web服务
  - type: web
    name: whatsapp-order-bot
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: |
      alembic upgrade head
      uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: whatsapp-bot-db
          property: connectionString
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: whatsapp:+14155238886
      - key: CLOUDINARY_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
    autoDeploy: true
    disk:
      name: whatsapp-bot-data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /health
    scaling:
      minInstances: 1
      maxInstances: 3  # 修正：最大实例数必须大于最小实例数
      targetMemoryPercent: 80
      targetCPUPercent: 80