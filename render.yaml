databases:
  - name: whatsapp-bot-db
    region: singapore
    plan: free
    ipAllowList: []

services:
  - type: web
    name: whatsapp-order-bot
    env: python
    pythonVersion: 3.11.8
    region: singapore
    plan: free
    buildCommand: |
      # 更新基础工具
      python -m pip install --upgrade pip setuptools wheel
      # 安装依赖（让 pip 自动解决版本问题）
      pip install -r requirements.txt
    startCommand: |
      # 运行数据库迁移
      alembic upgrade head
      # 启动应用
      uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: whatsapp-bot-db
          property: connectionString
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: whatsapp:+14155238886
      - key: CLOUDINARY_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: PYTHONUNBUFFERED
        value: "true"
    autoDeploy: true
    healthCheckPath: /health